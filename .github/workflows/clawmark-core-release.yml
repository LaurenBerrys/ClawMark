name: clawmark-core-release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to upload ClawMarkCore assets to
        required: true
        type: string
      include_windows:
        description: Also build and upload the Windows runtime payload
        required: false
        default: false
        type: boolean
  release:
    types: [published]

jobs:
  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm desktop:core:package:macos
      - uses: actions/upload-artifact@v4
        with:
          name: clawmark-core-macos
          path: |
            dist/ClawMarkCore-macos-*.tar.gz
            dist/clawmark-core-asset-manifest-macos-*.json

  package-windows:
    if: github.event_name == 'release' || inputs.include_windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm desktop:core:package:windows
      - uses: actions/upload-artifact@v4
        with:
          name: clawmark-core-windows
          path: |
            dist/ClawMarkCore-windows-*.zip
            dist/clawmark-core-asset-manifest-windows-*.json

  merge-manifest:
    runs-on: ubuntu-latest
    needs: [package-macos]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: clawmark-core-macos
          path: dist
      - run: |
          set -euo pipefail
          manifests=(dist/clawmark-core-asset-manifest-macos-*.json)
          if compgen -G "dist/clawmark-core-asset-manifest-windows-*.json" > /dev/null; then
            manifests+=(dist/clawmark-core-asset-manifest-windows-*.json)
          fi
          pnpm desktop:core:manifest dist/clawmark-core-manifest.json "${manifests[@]}"
        env:
          CLAWMARK_CORE_RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
          CLAWMARK_CORE_REPOSITORY: ${{ github.repository }}
      - uses: actions/upload-artifact@v4
        with:
          name: clawmark-core-manifest
          path: dist/clawmark-core-manifest.json
      - name: Upload assets to GitHub Release
        if: github.event_name == 'release' || inputs.tag_name != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mac_assets=(dist/ClawMarkCore-macos-*.tar.gz)
          windows_assets=(dist/ClawMarkCore-windows-*.zip)
          gh release upload "$TAG_NAME" "${mac_assets[@]}" dist/clawmark-core-manifest.json --clobber
          if ((${#windows_assets[@]} > 0)); then
            gh release upload "$TAG_NAME" "${windows_assets[@]}" --clobber
          fi
